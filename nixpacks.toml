# Nixpacks config for Coolify deployment
# Extends Node provider (which adds pnpm when pnpm-lock.yaml exists); adds JDK for bundletool

[phases.setup]
nixPkgs = ["...", "jdk17_headless"]

[phases.install]
cmds = [
  "pnpm install --frozen-lockfile",
  "mkdir -p /opt/bundletool",
  "curl -sL -o /opt/bundletool/bundletool.jar https://github.com/google/bundletool/releases/download/1.18.3/bundletool-all-1.18.3.jar"
]

[phases.build]
cmds = [
  "pnpm run build",
  "cp -r public .next/standalone/ 2>/dev/null || true",
  "cp -r .next/static .next/standalone/.next/"
]

[start]
cmd = "node .next/standalone/server.js"

[variables]
NODE_ENV = "production"
HOSTNAME = "0.0.0.0"
PORT = "3000"
